services:
  - type: web
    name: notarcteryx-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NOTARC_CORS_ORIGINS
        value: '["https://yourdomain.com"]'
      - key: PYTHON_VERSION
        value: "3.11.0"
